version: '3.8'

services:
  backend:
    build: 
      context: .
      dockerfile: backend.Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      # Enable LangSmith Tracing via Docker Compose
      - LANGCHAIN_TRACING_V2=true
      - LANGCHAIN_PROJECT=multi-agent-research-docker
    volumes:
      - ./data:/app/data

  frontend:
    build:
      context: ./frontend
      dockerfile: frontend.Dockerfile
    ports:
      - "5173:80" # Maps local port 5173 to nginx container port 80
    depends_on:
      - backend
